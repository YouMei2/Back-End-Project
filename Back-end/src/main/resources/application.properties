!database
spring.application.name=RESTful_API
spring.datasource.url=jdbc:mysql://sql7.freesqldatabase.com:3306/sql7822497?createDatabaseIfNotExist=true&useUnicode=yes&characterEncoding=UTF-8
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
!email properties joining to email
spring.mail.host=smtp.gmail.com
spring.mail.port=587

! Using placeholders for sensitive data
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}

!security protocol to protect the data
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

