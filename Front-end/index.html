<!DOCTYPE html>
<html>
<head>
    <title>My Life Wheel - Tasks</title>
    <meta charset="UTF-8">
    <style>
        body { font-family: sans-serif; max-width: 500px; margin: 50px auto; background: #f4f4f4; }
        .container { background: white; padding: 20px; border-radius: 8px; shadow: 0 2px 5px rgba(0,0,0,0.1); }
        input { width: 70%; padding: 10px; }
        button { padding: 10px; cursor: pointer; background: #28a745; color: white; border: none; }
        ul { list-style: none; padding: 0; }
        li { background: #eee; margin: 5px 0; padding: 10px; border-left: 5px solid #28a745; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Задачи по Колесу Жизни</h2>
        <input type="text" id="taskInput" placeholder="Что нужно сделать?">
        <button onclick="addTask()">Добавить</button>
        <ul id="taskList"></ul>
    </div>

    <script>
        // Функция загрузки задач с твоего бэкенда
        async function loadTasks() {
    const response = await fetch('http://localhost:8080/tasks');
    const tasks = await response.json();
    const list = document.getElementById('taskList');
    list.innerHTML = '';

            tasks.forEach(task => {
                const li = document.createElement('li');
                li.innerHTML = `
            ${task.description}
            <button onclick="deleteTask(${task.id})" style="margin-left: 10px; background: red; border-radius: 4px;">X</button>
        `;
                list.appendChild(li);
            });
}

async function deleteTask(id) {
    if (confirm('Удалить эту задачу?')) {
        await fetch(`http://localhost:8080/tasks/${id}`, {
            method: 'DELETE'
        });
        loadTasks(); // Обновляем список после удаления
    }
}

        // Функция отправки новой задачи на бэкенд
        async function addTask() {
            const input = document.getElementById('taskInput');
            await fetch('http://localhost:8080/tasks', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ description: input.value })
            });
            input.value = '';
            loadTasks(); // Обновляем список
        }

        loadTasks(); // Загрузить при старте страницы
    </script>
</body>
</html>
