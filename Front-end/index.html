<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Life Wheel - Tasks</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="header">
    <div class="logo">My Life Wheel</div>
    <div class="nav-btns">
        <button onclick="location.href='register.html'">Register</button>
        <button onclick="location.href='login.html'">Login</button>
    </div>
</div>

<div class="container">
    <h2>My Tasks</h2>

    <form class="input-group" id="taskForm">
        <input type="text" id="nameInput" placeholder="Category" required>
        <input type="text" id="taskInput" placeholder="What needs to be done?" required>
        <button type="submit" class="btn-add">Add Task</button>
    </form>

    <ul id="taskList"></ul>
</div>

<script src="script.js"></script>
</body>
</html>
