<!DOCTYPE html>
<html lang="ru">
<head>
    <title>My Life Wheel - Tasks</title>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
    <h2>Мои задачи</h2>

    <form class="input-group" id="taskForm">
        <input type="text" id="nameInput" placeholder="Категория (напр. Семья, Работа)" required>
        <input type="text" id="taskInput" placeholder="Что именно нужно сделать?" required>
        <button type="submit" class="btn-add">Добавить в список</button>
    </form>

    <ul id="taskList"></ul>
</div>

<script src="script.js"></script>
</body>
</html>
