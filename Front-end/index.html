<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Life Wheel - Tasks & Balance</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="header">
    <div class="logo">My Life Wheel</div>
    <div class="nav-btns" id="auth-section">
        <div id="guest-btns">
            <button onclick="location.href='register.html'">Register</button>
            <button onclick="location.href='login.html'">Login</button>
        </div>
        <div id="user-profile" style="display: none; align-items: center; gap: 15px;">
            <span id="welcome-text" style="font-weight: bold; color: #2e7d32;"></span>
            <button onclick="logout()" class="btn-logout">Logout</button>
        </div>
    </div>
</div>

<div class="container">
    <h2>My Tasks</h2>

    <div class="progress-section">
        <div class="progress-labels">
            <span class="progress-title">PROGRESS BAR</span>
            <span id="progressPercent">0%</span>
        </div>
        <div class="daily-progress">
            <div class="progress-fill" id="progressBar"></div>
        </div>
    </div>

    <form class="input-group" id="taskForm">
        <input type="text" id="nameInput" placeholder="Категория (Здоровье, Финансы...)" required>
        <input type="text" id="taskInput" placeholder="Что нужно сделать?" required>
        <select id="priorityInput" style="padding: 12px; border-radius: 6px; border: 1px solid #ddd;">
            <option value="low">🌱 Простая задача</option>
            <option value="medium">⚡ Средняя задача</option>
            <option value="high">🔥 Важная задача</option>
            <option value="goal">🏆 Личная цель</option>
        </select>
        <button type="submit" class="btn-add">Add Task</button>
    </form>
    <ul id="taskList"></ul>
</div>

<div class="container wheel-card-container">
    <div class="wheel-card">
        <h2 class="wheel-title">Колесо Жизни</h2>
        <div class="canvas-wrapper">
            <canvas id="balanceChart" width="550" height="550"></canvas>
        </div>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
